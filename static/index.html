<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domesticator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #f0f6fc;
  }

  header .badge {
    background: #238636;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .tabs {
    display: flex;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 0 24px;
    gap: 4px;
  }

  .tab {
    padding: 10px 18px;
    cursor: pointer;
    color: #8b949e;
    border-bottom: 2px solid transparent;
    font-size: 14px;
    transition: all 0.15s;
    user-select: none;
  }

  .tab:hover { color: #e1e4e8; }
  .tab.active { color: #f0f6fc; border-bottom-color: #1f6feb; }

  .container {
    max-width: 960px;
    margin: 24px auto;
    padding: 0 24px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card h3 {
    font-size: 14px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  button {
    background: #21262d;
    color: #e1e4e8;
    border: 1px solid #30363d;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }

  button:hover { background: #30363d; }

  button.primary {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
  }

  button.primary:hover { background: #388bfd; }

  button.danger {
    background: #da3633;
    border-color: #da3633;
    color: #fff;
  }

  button.danger:hover { background: #f85149; }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  input, textarea {
    background: #0d1117;
    color: #e1e4e8;
    border: 1px solid #30363d;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    width: 100%;
    font-family: inherit;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #1f6feb;
  }

  textarea { resize: vertical; min-height: 80px; }

  .json-output {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 500px;
    overflow-y: auto;
    color: #79c0ff;
  }

  .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }

  label.check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #8b949e;
    cursor: pointer;
  }

  label.check input[type="checkbox"] { accent-color: #1f6feb; }

  .host-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .host-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .host-item:hover { border-color: #1f6feb; }

  .host-item .name {
    font-weight: 500;
    font-size: 14px;
  }

  .host-item .strategies {
    color: #8b949e;
    font-size: 12px;
  }

  .proxy-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    margin-bottom: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #30363d;
    border-top-color: #1f6feb;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.ok { background: #3fb950; }
  .status-dot.err { background: #f85149; }

  .mt { margin-top: 12px; }
  .mb { margin-bottom: 12px; }
  .gap { gap: 12px; }
</style>
</head>
<body>

<header>
  <h1>Domesticator</h1>
  <span class="badge">v1.0.0</span>
</header>

<div class="tabs">
  <div class="tab active" data-tab="status">Status</div>
  <div class="tab" data-tab="crawl">Crawl</div>
  <div class="tab" data-tab="hosts">Host Configs</div>
  <div class="tab" data-tab="proxies">Proxies</div>
</div>

<div class="container">

  <!-- STATUS -->
  <div class="panel active" id="panel-status">
    <div class="card">
      <h3>Service Status</h3>
      <div class="row gap">
        <button onclick="checkStatus()">Check Status</button>
        <button onclick="checkHealth()">Health Check</button>
        <button onclick="checkPing()">Ping</button>
      </div>
      <div class="json-output mt" id="status-output">Click a button to check...</div>
    </div>
  </div>

  <!-- CRAWL -->
  <div class="panel" id="panel-crawl">
    <div class="card">
      <h3>Web Scraping</h3>
      <textarea id="crawl-urls" placeholder="Enter URLs, one per line...&#10;https://www.trendyol.com/...&#10;https://www.amazon.com.tr/..."></textarea>
      <div class="row wrap mt">
        <label class="check"><input type="checkbox" id="crawl-require-config" checked> Require host config</label>
        <label class="check"><input type="checkbox" id="crawl-performance"> Performance mode</label>
        <label class="check"><input type="checkbox" id="crawl-page-content"> Include page content</label>
      </div>
      <button class="primary mt" id="crawl-btn" onclick="doCrawl()">Crawl</button>
    </div>
    <div class="card">
      <h3>Results</h3>
      <div class="json-output" id="crawl-output">Results will appear here...</div>
    </div>
  </div>

  <!-- HOST CONFIGS -->
  <div class="panel" id="panel-hosts">
    <div class="card">
      <h3>Host Configurations</h3>
      <button onclick="loadHosts()" class="mb">Refresh</button>
      <div class="host-list" id="hosts-list"></div>
    </div>
    <div class="card" id="host-detail-card" style="display:none">
      <h3>Config Detail</h3>
      <div class="json-output" id="host-detail"></div>
    </div>
    <div class="card">
      <h3>Add Host Config</h3>
      <div class="row gap">
        <input id="add-hostname" placeholder="hostname (e.g. example.com)" style="flex:2">
        <input id="add-strategy" placeholder="strategy" value="default" style="flex:1">
      </div>
      <textarea id="add-config" class="mt" placeholder='{"field_extractors": {"price": {"selectors": [".price"], "required": true, "transforms": ["clean_text", "text_to_price"]}}}'></textarea>
      <button class="primary mt" onclick="addHostConfig()">Add Config</button>
    </div>
  </div>

  <!-- PROXIES -->
  <div class="panel" id="panel-proxies">
    <div class="card">
      <h3>Proxy Management</h3>
      <div class="row gap mb">
        <input id="proxy-url" placeholder="http://user:pass@host:port" style="flex:1">
        <button class="primary" onclick="addProxy()">Add Proxy</button>
      </div>
      <button onclick="loadProxies()" class="mb">Refresh</button>
      <div id="proxies-list"></div>
      <div class="json-output mt" id="proxies-output" style="display:none"></div>
    </div>
  </div>

</div>

<script>
// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

    // Auto-load on tab switch
    if (tab.dataset.tab === 'hosts') loadHosts();
    if (tab.dataset.tab === 'proxies') loadProxies();
  });
});

// --- Helpers ---
function json(el, data) {
  el.textContent = JSON.stringify(data, null, 2);
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  return { status: res.status, data: await res.json() };
}

// --- Status ---
async function checkStatus() {
  const out = document.getElementById('status-output');
  out.textContent = 'Loading...';
  const r = await api('GET', '/v0/status');
  json(out, r.data);
}

async function checkHealth() {
  const out = document.getElementById('status-output');
  out.textContent = 'Loading...';
  const r = await api('GET', '/health');
  json(out, r.data);
}

async function checkPing() {
  const out = document.getElementById('status-output');
  out.textContent = 'Loading...';
  const r = await api('GET', '/ping');
  json(out, r.data);
}

// --- Crawl ---
async function doCrawl() {
  const btn = document.getElementById('crawl-btn');
  const out = document.getElementById('crawl-output');
  const urls = document.getElementById('crawl-urls').value.trim().split('\n').filter(u => u.trim());

  if (!urls.length) { out.textContent = 'Enter at least one URL'; return; }

  const requireConfig = document.getElementById('crawl-require-config').checked;
  const perfMode = document.getElementById('crawl-performance').checked;
  const pageContent = document.getElementById('crawl-page-content').checked;

  const targets = urls.map(url => {
    const t = { url: url.trim(), require_host_config: requireConfig };
    if (perfMode) t.performance_mode = true;
    if (pageContent) t.with_page_content = { type: 'unrendered' };
    return t;
  });

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Crawling...';
  out.textContent = 'Crawling ' + urls.length + ' URL(s)...';

  try {
    const r = await api('POST', '/v0/crawl', { targets });
    json(out, r.data);
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Crawl';
  }
}

// --- Hosts ---
async function loadHosts() {
  const list = document.getElementById('hosts-list');
  list.innerHTML = '<span style="color:#8b949e">Loading...</span>';

  const r = await api('GET', '/v0/config/hosts');
  list.innerHTML = '';

  for (const [hostname, strategies] of Object.entries(r.data)) {
    const strats = Object.keys(strategies);
    const item = document.createElement('div');
    item.className = 'host-item';
    item.innerHTML = `
      <div>
        <div class="name">${hostname}</div>
        <div class="strategies">strategies: ${strats.join(', ')}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="viewHost('${hostname}')">View</button>
        <button class="danger" onclick="deleteHost('${hostname}')">Delete</button>
      </div>
    `;
    list.appendChild(item);
  }

  if (!Object.keys(r.data).length) {
    list.innerHTML = '<span style="color:#8b949e">No host configs found</span>';
  }
}

async function viewHost(hostname) {
  const card = document.getElementById('host-detail-card');
  const out = document.getElementById('host-detail');
  card.style.display = 'block';
  out.textContent = 'Loading...';
  const r = await api('GET', '/v0/config/hosts/' + hostname);
  json(out, r.data);
}

async function deleteHost(hostname) {
  if (!confirm('Delete all configs for ' + hostname + '?')) return;
  await api('DELETE', '/v0/config/hosts/' + hostname);
  loadHosts();
  document.getElementById('host-detail-card').style.display = 'none';
}

async function addHostConfig() {
  const hostname = document.getElementById('add-hostname').value.trim();
  const strategy = document.getElementById('add-strategy').value.trim() || 'default';
  const configText = document.getElementById('add-config').value.trim();

  if (!hostname) { alert('Enter hostname'); return; }

  let config;
  try {
    config = configText ? JSON.parse(configText) : { field_extractors: {} };
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
    return;
  }

  const r = await api('POST', '/v0/config/hosts/' + hostname + '?strategy=' + strategy, config);
  if (r.status >= 400) {
    alert('Error: ' + (r.data.detail || JSON.stringify(r.data)));
  } else {
    document.getElementById('add-hostname').value = '';
    document.getElementById('add-config').value = '';
    loadHosts();
  }
}

// --- Proxies ---
async function loadProxies() {
  const list = document.getElementById('proxies-list');
  list.innerHTML = '<span style="color:#8b949e">Loading...</span>';

  const r = await api('GET', '/v0/proxies');
  list.innerHTML = '';

  if (!r.data.proxies.length) {
    list.innerHTML = '<span style="color:#8b949e">No proxies configured</span>';
    return;
  }

  for (const proxy of r.data.proxies) {
    const item = document.createElement('div');
    item.className = 'proxy-item';
    item.innerHTML = `
      <span>${proxy}</span>
      <button class="danger" onclick="removeProxy('${proxy}')">Remove</button>
    `;
    list.appendChild(item);
  }
}

async function addProxy() {
  const input = document.getElementById('proxy-url');
  const url = input.value.trim();
  if (!url) return;

  const r = await api('POST', '/v0/proxies/add', { proxy_url: url });
  if (r.status >= 400) {
    alert('Error: ' + (r.data.detail || JSON.stringify(r.data)));
  } else {
    input.value = '';
    loadProxies();
  }
}

async function removeProxy(proxyUrl) {
  if (!confirm('Remove proxy?')) return;
  await api('DELETE', '/v0/proxies/' + encodeURIComponent(proxyUrl));
  loadProxies();
}
</script>

</body>
</html>
